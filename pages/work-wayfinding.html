<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Wayfinding — Case Study</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../aurora-glass.css" />
  </head>
  <body class="min-h-screen bg-night-black text-[#f5ede0]" style="background:#05070f;">
    <div class="aurora-bg" aria-hidden="true"><div class="aurora-orb orb-1"></div><div class="aurora-orb orb-2"></div><div class="aurora-orb orb-3"></div><div class="aurora-orb orb-4"></div><div class="aurora-grid"></div></div>
    <div class="cursor-dot" id="cursorDot"></div>
    <div class="cursor-ring" id="cursorRing"></div>
    <main class="relative z-[2] mx-auto max-w-3xl px-6 pb-20 pt-20">
      <a href="../index.html#work" class="font-mono text-xs uppercase tracking-[0.2em] text-star-gold">← Back to selected work</a>
      <article class="glass-card mt-8 border border-[var(--glass-border)] bg-[var(--glass-bg)] p-8 backdrop-blur-xl">
        <h1 class="aurora-text font-display text-5xl text-star-white">Wayfinding</h1>
        <p class="mt-4 text-cream-muted">Campus navigation that respects cognitive load.</p>
        <p class="mt-8 leading-relaxed text-cream-soft">Signage and digital wayfinding aligned to one mental model: landmarks first, then paths, then room numbers. Accessibility specs include non-color route cues and readable hierarchy in physical and digital contexts.</p>
      </article>
    </main>
    <script src="../aurora.js"></script>
  </body>
</html>
